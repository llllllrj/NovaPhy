name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set CMake toolchain path
        shell: bash
        run: |
          TOOLCHAIN="${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake"
          TOOLCHAIN="${TOOLCHAIN//\\//}"
          echo "CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN}" >> "$GITHUB_ENV"

      - name: Install Python build dependencies
        run: pip install scikit-build-core pybind11 numpy pytest

      - name: Build and install
        run: pip install -e .

      - name: Run tests
        run: pytest tests/python/ -v
